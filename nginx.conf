server {
  listen 8080;
  server_name _;

  # DNS embebido de Docker. Con esto + variables en proxy_pass, nginx resuelve
  # los nombres de los upstreams en cada peticion (no solo al arrancar), asi que
  # si account-core-service/party-service/clearinghouse-adapter no estan listos
  # todavia, nginx SI arranca igual (devuelve 502 solo en esa ruta puntual en vez
  # de entrar en crash-loop completo por un host no resuelto).
  resolver 127.0.0.11 valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  location ~ ^/account/(.*)$ {
    set $account_upstream http://account-core-service:8081;
    proxy_pass $account_upstream/$1$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/party/(.*)$ {
    set $party_upstream http://party-service:8083;
    proxy_pass $party_upstream/$1$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/clearing/(.*)$ {
    set $clearing_upstream http://clearinghouse-adapter:8087;
    proxy_pass $clearing_upstream/$1$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
